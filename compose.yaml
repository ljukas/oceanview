services:
  db:
    image: neondatabase/neon_local:latest
    ports:
      - "5432:5432"
    environment:
      NEON_API_KEY: ${NEON_API_KEY}
      NEON_PROJECT_ID: ${NEON_PROJECT_ID}
      PARENT_BRANCH_ID: ${PARENT_BRANCH_ID}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U neon"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  # Dedicated test DB on a separate ephemeral Neon branch so `pnpm test` can't
  # clobber the dev DB on :5432. Brought up explicitly via `pnpm db:test:up`.
  # CI doesn't use this service — its workflow runs the single `db` service
  # and overrides DATABASE_URL via the job env block.
  db-test:
    image: neondatabase/neon_local:latest
    ports:
      - "5433:5432"
    environment:
      NEON_API_KEY: ${NEON_API_KEY}
      NEON_PROJECT_ID: ${NEON_PROJECT_ID}
      PARENT_BRANCH_ID: ${PARENT_BRANCH_ID}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U neon"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
