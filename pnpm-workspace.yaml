# Pin kysely to 0.28.x: @better-auth/kysely-adapter@1.6.14 (latest) still imports
# DEFAULT_MIGRATION_TABLE / DEFAULT_MIGRATION_LOCK_TABLE from "kysely", but kysely
# 0.29 moved them to the "kysely/migration" subpath, which breaks the build.
# Fixed upstream by better-auth#9811 but not yet released — remove this override
# once a better-auth release containing it lands. See better-auth#9810.
overrides:
  kysely: ^0.28.17

allowBuilds:
  '@prisma/client': false
  better-sqlite3: false
  esbuild: true
  msgpackr-extract: true
  msw: false
  sharp: true
minimumReleaseAgeExclude:
  - '@tanstack/react-start-rsc@0.1.19'
  - '@tanstack/react-start@1.168.20'
  - '@tanstack/start-plugin-core@1.171.12'
  - '@types/node@24.13.0'
  - '@aws-sdk/client-s3@3.1062.0'
  - '@aws-sdk/credential-provider-ini@3.972.49'
  - '@aws-sdk/credential-provider-login@3.972.48'
  - '@aws-sdk/credential-provider-node@3.972.51'
  - '@aws-sdk/credential-provider-sso@3.972.48'
  - '@aws-sdk/credential-provider-web-identity@3.972.48'
  - '@aws-sdk/nested-clients@3.997.16'
  - '@aws-sdk/s3-request-presigner@3.1062.0'
  - '@aws-sdk/token-providers@3.1062.0'
  - '@vercel/queue@0.3.0'
  - '@img/sharp-darwin-arm64@0.35.0'
  - '@img/sharp-darwin-x64@0.35.0'
  - '@img/sharp-freebsd-wasm32@0.35.0'
