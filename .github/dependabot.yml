version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # @types/node major must track the Node.js runtime (Node 24 in CI + on
      # Vercel). Holding the types ahead of the runtime would type APIs that
      # don't exist at runtime. Bump this in lockstep when we move to a newer
      # Node LTS.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      npm-dependencies:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
