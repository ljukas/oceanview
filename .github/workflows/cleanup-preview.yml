name: Cleanup preview resources

# When a PR closes (merged or abandoned), drop the Neon branch the Vercel↔Neon
# integration / Neon Local created for it, and prune stale Vercel preview
# deployments. Best-effort: a single failure must not block anything — the
# nightly neon-branch-sweep workflow is the real safety net.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: cleanup-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    name: Delete Neon branch & prune Vercel previews
    runs-on: ubuntu-latest
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      HEAD_REF: ${{ github.head_ref }}
    steps:
      - name: Delete matching Neon branch(es)
        run: |
          set -euo pipefail
          if [ -z "${NEON_API_KEY:-}" ] || [ -z "${NEON_PROJECT_ID:-}" ]; then
            echo "NEON_API_KEY / NEON_PROJECT_ID not set; skipping Neon cleanup."
            exit 0
          fi
          echo "PR head ref: $HEAD_REF"

          # The integration / Neon Local names a branch after the git ref, but it
          # may be `preview/`-prefixed and/or truncated (e.g.
          # feat/document-multiselect-bulk-actions -> feat/document-multi). So
          # match by exact, preview/-prefixed, or "branch name is a prefix of the
          # head ref" (handles truncation). Never touch default/protected.
          npx --yes neonctl@2 branches list \
            --project-id "$NEON_PROJECT_ID" --output json \
            | jq -r --arg head "$HEAD_REF" '
                .[]
                | select(.default == false and (.primary // false) == false
                         and (.protected // false) == false and .name != "main")
                | . as $b | (.name) as $name | ($name | ltrimstr("preview/")) as $stripped
                | select(
                    $name == $head
                    or $name == ("preview/" + $head)
                    or ($head | startswith($name))
                    or ($head | startswith($stripped))
                  )
                | "\($b.id)\t\($name)"
              ' > matches.tsv || true

          if [ ! -s matches.tsv ]; then
            echo "No Neon branch matched '$HEAD_REF'."
            exit 0
          fi

          while IFS=$'\t' read -r id name; do
            [ -z "$id" ] && continue
            echo "Deleting Neon branch '$name' ($id)"
            npx --yes neonctl@2 branches delete "$id" --project-id "$NEON_PROJECT_ID" \
              || echo "::warning::Failed to delete Neon branch $name ($id)"
          done < matches.tsv

      - name: Prune stale Vercel preview deployments
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: |
          set -euo pipefail
          # --safe never removes production or currently-aliased deployments, so
          # the live branch alias of any *open* PR is protected; only unaliased /
          # old previews go. Removing them also lets the native integration drop
          # the corresponding preview Neon branches.
          npx --yes vercel@latest remove oceanview \
            --safe --yes \
            --scope lukas-lindqvists-projects \
            --token "$VERCEL_TOKEN" \
            || echo "::warning::vercel remove failed (token/scope?)"
